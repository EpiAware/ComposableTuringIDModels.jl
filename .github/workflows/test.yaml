name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@42a0501ccacefbfc2f2eeca640714a19c50bfe58
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@42a0501ccacefbfc2f2eeca640714a19c50bfe58
    secrets: inherit  # pragma: allowlist secret
