# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@c758269c3e60b7148e9f15d7f0d493aaa4fb8ffc
    # The package floor is Julia 1.11 (the Turing 0.45 / DynamicPPL 0.41 stack
    # needs >= 1.11 at its compat lower bounds, and `Pkg.test` only honours the
    # test env's `[sources]` entry for the unregistered EpiAwarePackageTools on
    # Julia >= 1.11). So test the 1.11 floor and the latest release instead of
    # the `lts` channel, which is still 1.10.
    with:
      julia_versions: '["1.11", "1", "pre"]'
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@c758269c3e60b7148e9f15d7f0d493aaa4fb8ffc
    # Resolve the minimum compat set on the 1.11 floor, not the default 1.10.
    with:
      julia_version: '1.11'
    secrets: inherit  # pragma: allowlist secret
