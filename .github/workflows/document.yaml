name: Documenter

on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

# Concurrency is keyed on the ref so a main build and a PR build never share a
# group. For PR/preview builds we cancel superseded runs (cancel-in-progress:
# true) to save runner time. For the `main` build we must NOT cancel in progress:
# the build that deploys the versioned (`dev`) docs to gh-pages has to run to
# completion, otherwise no clean deploy ever lands. Because main builds queue on
# the shared org runner, an in-flight main deploy was being cancelled by the next
# push before it finished, leaving gh-pages with only PR previews and an empty
# versions list. Setting cancel-in-progress false for main lets the deploy finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  Documenter:
    uses: EpiAware/.github/.github/workflows/documentation.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    secrets: inherit  # pragma: allowlist secret
