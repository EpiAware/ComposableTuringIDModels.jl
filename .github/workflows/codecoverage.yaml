name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@42a0501ccacefbfc2f2eeca640714a19c50bfe58
    with:
      julia_version: '1'
      # Don't fail the job on a Codecov upload error. The tests + coverage
      # processing still run and gate; only the upload is best-effort. No
      # CODECOV_TOKEN secret is set on this repo, and Codecov rejects tokenless
      # uploads on a protected branch ("Token required because branch is
      # protected"). Set the CODECOV_TOKEN repo secret and flip this back to
      # true to make coverage reporting required.
      fail_ci_if_error: false
    secrets: inherit  # pragma: allowlist secret
